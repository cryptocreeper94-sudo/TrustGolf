services:
  - type: web
    name: trustgolf
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run expo:static:build && npm run server:build
    startCommand: node server_dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: APP_DOMAIN
        value: trustgolf.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DW_MEDIA_API_KEY
        sync: false
      - key: DW_MEDIA_API_SECRET
        sync: false
      - key: DW_MEDIA_BASE_URL
        value: https://trustvault.studio
      - key: TZ
        value: "America/Chicago"
